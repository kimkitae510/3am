# 배포 중 재시작 시 진행 중인 요청, 비동기 저장이 강제 종료되지 않게 유예를 둔다.
server:
  shutdown: graceful

spring:
  application:
    name: 3am

  lifecycle:
    timeout-per-shutdown-phase: 20s

  mvc:
    async:
      # 비동기 응답(진단 등 CompletableFuture 반환)의 HTTP 대기 상한.
      # 미설정이면 톰캣 기본 30초 — 진단 LLM 대기보다 짧아, 그보다 긴 진단은 성공하고도
      # 요청이 먼저 끊겼다(실측: 타임아웃 3초 뒤 진단 완료, 결과는 저장됨).
      # 진단 상한(llm.*.assessment-timeout-seconds = 90초) + 저장 여유를 덮게 120초.
      # 이게 먼저 터지면 유저는 에러를 보는데 LLM 호출은 계속 돈다.
      request-timeout: 120s

  config:
    # 저장소 밖에서 관리하는 설정. 파일이 없으면 조용히 무시된다.
    # persona.yml: 페르소나 실문구 / reminder.yml: 매 턴 스타일 리마인더
    # extractor.yml: 채팅 사실 추출 프롬프트 / rubric.yml: 진단 루브릭 전문
    # application-secret.yml: 실연동 키(메일, 소셜 등 — gitignore)
    import:
      - optional:file:./persona.yml
      - optional:file:./reminder.yml
      - optional:file:./extractor.yml
      - optional:file:./rubric.yml
      - optional:file:./application-secret.yml

  datasource:
    url: jdbc:mysql://localhost:3306/threeam?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate      # 자동 생성/변경 금지. 스키마는 수동 DDL로 관리(불일치만 검증)
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: true
    open-in-view: false

  # Redis 미사용 — 의존성과 함께 주석 처리(build.gradle 참고). 재도입 시 주석 해제.
  # data:
  #   redis:
  #     host: ${REDIS_HOST:localhost}
  #     port: ${REDIS_PORT:6379}

  # 가입 인증 메일 발송용 SMTP (Gmail). 실제 계정/앱 비밀번호는 환경변수로 주입.
  # mail.provider=mock이면 이 설정은 사용되지 않는다.
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000

# JWT (실제 시크릿은 환경변수로 주입)
jwt:
  secret: ${JWT_SECRET:change-me-to-a-long-random-secret-key-at-least-256-bits}
  access-token-validity-seconds: 1800       # 30분
  refresh-token-validity-seconds: 1209600   # 14일

# LLM — 기본은 mock(무료, 키 불필요). 실연동 시 LLM_PROVIDER=gemini + LLM_API_KEY 주입.
llm:
  provider: ${LLM_PROVIDER:mock}   # mock | gemini | vertex
  gemini:
    api-key: ${LLM_API_KEY:}
    # 개발 기본값은 flash. 최저가인 lite는 무료 티어에서 피크 503과 일일 한도 소진이 잦아
    # 개발 흐름을 끊는다(2025-11 실측). 비용 최적화(역할별 lite 분리)는 유료 전환 뒤 실측으로 결정.
    model: ${LLM_MODEL:gemini-2.5-flash}
    # 진단 전용 모델(선택). 비우면 model 사용 — vertex와 동일한 분리를 gemini 경로에도 지원.
    assessment-model: ${LLM_ASSESSMENT_MODEL:}
    base-url: https://generativelanguage.googleapis.com/v1beta
    # 채팅 응답 대기 상한. 초과 시 실패 처리 → 대화는 폴백 메시지 저장.
    # thinking을 켠 뒤 30초로는 정상 응답도 잘려서 50초로.
    # 프론트 폴링 포기 시각(ChatPage POLL_TIMEOUT)보다 작아야 폴백이 화면에 닿는다.
    timeout-seconds: 50
    # 진단(deep) 응답 대기 상한. 채팅 값의 배수가 아니라 독립값이다 — 배수로 묶여 있던 동안
    # 채팅 타임아웃을 올릴 때마다 진단이 따라 올라 아래 두 상한을 넘길 뻔했다.
    # usage.in-flight-ttl-seconds와 spring request-timeout보다 작아야 한다.
    assessment-timeout-seconds: 90
    # thinking 세기. 2.5 계열은 budget(토큰), 3.x는 level(low|medium|high)을 쓴다 — 세대마다 필드가 다르다.
    # 모델을 바꿔도 코드를 안 고치게 설정으로 뺐다. 더 강한 모델로 갈아탈 땐 level도 같이 올려라.
    thinking-budget: ${LLM_THINKING_BUDGET:2048}
    thinking-level: ${LLM_THINKING_LEVEL:low}
    # 100만 토큰당 단가(USD). 넣으면 호출마다 실제 비용이 로그와 지표(llm.cost.usd)로 남는다.
    # 0이면 계산을 건너뛴다 — 임의의 기본값을 박아두면 모델을 바꿨을 때 틀린 비용이 맞는 것처럼 찍혀서다.
    # 모델을 바꾸면 이 셋도 같이 바꿔라. 값은 공식 가격표에서 확인한다.
    input-price-per-million: ${LLM_PRICE_INPUT:0}
    cached-input-price-per-million: ${LLM_PRICE_CACHED_INPUT:0}
    output-price-per-million: ${LLM_PRICE_OUTPUT:0}
  # Vertex AI — 같은 Gemini를 GCP 상품 경로로(크레딧 결제). 인증은 GOOGLE_APPLICATION_CREDENTIALS
  # (서비스 계정 키 파일 경로) 표준 환경변수. 크레딧 소진/만료 시 LLM_PROVIDER=gemini로 복귀.
  vertex:
    project-id: ${GCP_PROJECT_ID:}
    location: ${GCP_LOCATION:global}
    model: ${LLM_MODEL:gemini-2.5-flash}
    # 진단 전용 모델(선택). 비우면 model 사용. 진단은 긴 루브릭이라 강한 모델 배정 가능.
    assessment-model: ${LLM_ASSESSMENT_MODEL:}
    timeout-seconds: 50              # gemini 경로와 같은 값 유지(위 주석 참고)
    assessment-timeout-seconds: 90
    thinking-budget: ${LLM_THINKING_BUDGET:2048}
    thinking-level: ${LLM_THINKING_LEVEL:low}
    # 100만 토큰당 단가(USD). 넣으면 호출마다 실제 비용이 로그와 지표(llm.cost.usd)로 남는다.
    # 0이면 계산을 건너뛴다 — 임의의 기본값을 박아두면 모델을 바꿨을 때 틀린 비용이 맞는 것처럼 찍혀서다.
    # 모델을 바꾸면 이 셋도 같이 바꿔라. 값은 공식 가격표에서 확인한다.
    input-price-per-million: ${LLM_PRICE_INPUT:0}
    cached-input-price-per-million: ${LLM_PRICE_CACHED_INPUT:0}
    output-price-per-million: ${LLM_PRICE_OUTPUT:0}

# 인증 메일 — 기본은 mock(발송 없이 서버 로그로 코드 확인). 실발송 시 MAIL_PROVIDER=smtp
# + MAIL_USERNAME(Gmail 주소), MAIL_PASSWORD(앱 비밀번호) 주입.
mail:
  provider: ${MAIL_PROVIDER:mock}   # mock | smtp
  from: ${MAIL_USERNAME:}

# 소셜 로그인 — 기본은 mock(키 불필요, 같은 code면 같은 계정). 실연동 시 OAUTH_PROVIDER=real
# + 카카오 REST API 키, 네이버 Client ID/Secret 주입. redirect_uri는 프론트가 요청에 담아 보낸다
# (인가 요청과 토큰 교환의 값이 같아야 하고, 등록된 URI인지는 카카오/네이버가 검증).
oauth:
  provider: ${OAUTH_PROVIDER:mock}   # mock | real
  kakao:
    client-id: ${KAKAO_CLIENT_ID:}
    client-secret: ${KAKAO_CLIENT_SECRET:}   # 콘솔 보안 설정에서 켰을 때만 필요
  naver:
    client-id: ${NAVER_CLIENT_ID:}
    client-secret: ${NAVER_CLIENT_SECRET:}
  timeout-seconds: 10

# 사용량 제한 — LLM 비용 어뷰징 방지. 한도는 실제 비용 추이를 보고 조정한다.
# (일반 API의 공통 빈도 제한은 앱이 아니라 인프라 층(nginx 등)에서 건다 — 운영 전환 시.)
usage:
  chat-daily-limit: 5          # 일일 무료 대화 한도(가입 선물 이용권은 별도 — WelcomeGiftService)
  assessment-daily-limit: 1
  guest-chat-total-limit: 3    # 게스트 대화 총량(리셋 없음). 진단은 게스트 0회 고정(코드에서 차단)
  in-flight-ttl-seconds: 120   # 생성 중 잠금이 해제 유실돼도 이 시간 뒤 자동으로 풀린다
                               # (진단 응답 상한 90초보다 길어야 한다 — 짧으면 진행 중에 풀려 중복 생성이 된다)

# 결제 — 기본은 mock(키 불필요, 무조건 승인). 실연동 시 PAYMENT_PROVIDER=toss + 키 2종 주입.
# client-key는 프론트 위젯용(공개 가능), secret-key는 서버 승인/취소용(절대 비공개).
payment:
  provider: ${PAYMENT_PROVIDER:mock}   # mock | toss
  toss:
    client-key: ${TOSS_CLIENT_KEY:}
    secret-key: ${TOSS_SECRET_KEY:}
    base-url: https://api.tosspayments.com/v1
    timeout-seconds: 30
  order-expire-minutes: 30        # READY로 방치된 주문의 만료 기준
  sync-after-minutes: 2           # 승인/취소 응답 불명 상태를 재동기화하기까지의 대기
  max-pending-orders-per-user: 5  # 유저당 미결(READY) 주문 상한(주문 생성 도배 방어)

# CORS — 프론트(개발 서버) origin. 콤마로 여러 개 허용. 운영 도메인은 환경변수로 주입.
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# 모니터링
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: when_authorized
  health:
    # SMTP 연결 상태를 health에 넣지 않는다. 액추에이터는 mail 설정이 있으면 매 체크마다
    # gmail 접속을 시도하는데, mock 메일(키 없음)에선 반드시 실패해 전체 status를 DOWN으로 만든다.
    # 실연동 후에도 health마다 외부 SMTP를 두드리는 건 부하라 끈다(발송 기능 자체와는 무관).
    mail:
      enabled: false

# 로그 레벨, 출력(콘솔/파일), traceId 패턴은 logback-spring.xml에서 프로파일별로 관리한다.
# show-sql은 개발 기본값만 여기 두고, 운영(prod)에서는 application-prod.yml이 꺼서 개인정보(사연) 쿼리 노출을 막는다.

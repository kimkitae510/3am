spring:
  application:
    name: 3am

  datasource:
    url: jdbc:mysql://localhost:3306/threeam?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update        # 개발 단계: update / 운영: validate 권장
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: true
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# JWT (실제 시크릿은 환경변수로 주입)
jwt:
  secret: ${JWT_SECRET:change-me-to-a-long-random-secret-key-at-least-256-bits}
  access-token-validity-seconds: 1800       # 30분
  refresh-token-validity-seconds: 1209600   # 14일

# LLM — 기본은 mock(무료·키 불필요). 실연동 시 LLM_PROVIDER=gemini + LLM_API_KEY 주입.
llm:
  provider: ${LLM_PROVIDER:mock}   # mock | gemini
  gemini:
    api-key: ${LLM_API_KEY:}
    model: gemini-2.5-flash-lite
    base-url: https://generativelanguage.googleapis.com/v1beta

# 모니터링
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.threeam: debug

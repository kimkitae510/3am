spring:
  application:
    name: 3am

  datasource:
    url: jdbc:mysql://localhost:3306/threeam?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate      # 자동 생성/변경 금지. 스키마는 수동 DDL로 관리(불일치만 검증)
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: true
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# JWT (실제 시크릿은 환경변수로 주입)
jwt:
  secret: ${JWT_SECRET:change-me-to-a-long-random-secret-key-at-least-256-bits}
  access-token-validity-seconds: 1800       # 30분
  refresh-token-validity-seconds: 1209600   # 14일

# LLM — 기본은 mock(무료·키 불필요). 실연동 시 LLM_PROVIDER=gemini + LLM_API_KEY 주입.
llm:
  provider: ${LLM_PROVIDER:mock}   # mock | gemini
  gemini:
    api-key: ${LLM_API_KEY:}
    model: gemini-2.5-flash-lite
    base-url: https://generativelanguage.googleapis.com/v1beta
    timeout-seconds: 30   # 응답 대기 상한. 초과 시 실패 처리 → 대화는 폴백 메시지 저장

# 사용량 제한 — LLM 비용 어뷰징 방지. 한도는 실제 비용 추이를 보고 조정한다.
# (일반 API의 공통 빈도 제한은 앱이 아니라 인프라 층(nginx 등)에서 건다 — 운영 전환 시.)
usage:
  chat-daily-limit: 50
  assessment-daily-limit: 3
  in-flight-ttl-seconds: 120   # 생성 중 잠금이 해제 유실돼도 이 시간 뒤 자동으로 풀린다

# CORS — 프론트(개발 서버) origin. 콤마로 여러 개 허용. 운영 도메인은 환경변수로 주입.
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# 모니터링
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.threeam: debug
